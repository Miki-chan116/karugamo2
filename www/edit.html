<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>編集 - カルガモカウンター</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
}

/* index.html と同じ変数・ベース */
:root {
  --green-main:#0b5a35;
  --green-dark:#084526;
  --accent-orange:#ff8c1a;
  --accent-red:#e60000;
  --white:#ffffff;
  --divider-color: rgba(255,255,255,0.3);
}

body {
  margin:0;
  background:var(--green-main);
  color:var(--white);
  font-family:-apple-system, BlinkMacSystemFont,"Segoe UI",
               Roboto,"Noto Sans JP",sans-serif;
  font-variant-numeric: tabular-nums;
}

/* ヘッダー・フッターは同様 */
header, footer {
  position:fixed;
  left:0;
  right:0;
  width: 100vw;
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  height:64px;
  background:var(--white);
  display:flex;
  align-items:center;
}

header {
  position:fixed;
  top:0;
  left:0;
  right:0;
  height:64px;
  background:var(--white);
  color:#000;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 12px;
  z-index:10;
}

header .date {
  font-size:20px;
  font-weight:bold;
  padding-left: 12px;
}

header button {
  margin-right: 12px;
}

/* 12H / 24H 切り替えボタン */
.time-toggle {
  min-height: 40px;
  padding: 0 14px;

  border-radius: 999px;
  border: 1px solid var(--divider-color);
  background: transparent;

  font-size: 14px;
  font-weight: bold;
  color: #666;

  display: flex;
  align-items: center;
  justify-content: center;

  cursor: pointer;
}

/* 選択中 */
.time-toggle.active {
  background: #cccccc;
  border-color: var(--divider-color);
  color: #000;
}

footer {
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  height:64px;
  background:var(--white);
  display:flex;
}

footer button {
  flex:1;
  height:100%;
  font-size:18px;
  border:none;
  margin:0;
  padding:0;
  display:flex;
  align-items:center;
  justify-content:center;
  box-sizing:border-box;
}

.back-btn {
  background:#ddd;
  font-weight:bold;
}

.send-btn {
  background:var(--accent-orange);
  color:#000;
  font-weight:bold;
}

/* ===== メイン ===== */
main {
  padding:88px 16px 120px;
}

.add-btn {
  width:100%;
  font-size:22px;
  font-weight:bold;
  padding:14px;
  background:#4dff9e;
  border:none;
  margin-bottom:20px;
}

.btn {
  border-radius: 12px;
}

.row {
  display:flex;
  align-items:center;
  border-bottom: 1px solid var(--divider-color);
  padding:16px 0;
}

.delete-btn {
  background:var(--accent-red);
  color:#000;
  border:none;
  font-size:18px;
  font-weight:bold;
  padding:6px 10px;
  margin-right:12px;
}

.time {
  font-size:40px;
  flex:1;
}

.count {
  width:40px;
  height:40px;
  border-radius:50%;
  background: transparent;
  border: 1px solid var(--divider-color);
  color: #eee;
  display:flex;
  justify-content:center;
  align-items:center;
  font-weight:bold;
}
</style>
</head>

<body>

<header>
  <div class="date">🦆 2026年4月23日（木）</div>
  <button class="time-toggle active">12H</button>
</header>

<main>

  <button class="add-btn btn">➕ 時刻を追加する</button>

  <div class="row">
    <button class="delete-btn btn" onclick="confirmDelete()">削除する</button>
    <div class="time">17:15</div>
    <div class="count">3</div>
  </div>

  <div class="row">
    <button class="delete-btn btn" onclick="confirmDelete()">削除する</button>
    <div class="time">16:13</div>
    <div class="count">2</div>
  </div>

  <div class="row">
    <button class="delete-btn btn" onclick="confirmDelete()">削除する</button>
    <div class="time">15:12</div>
    <div class="count">1</div>
  </div>

</main>

<footer>
  <button class="back-btn"><< もどる</button>
  <button class="send-btn">📤 データを送る</button>
</footer>

<script>
function confirmDelete() {
  if (confirm('本当に削除しますか？')) {
    alert('削除しました');
  }
}

const dateEl = document.querySelector('.date');

const now = new Date();
const year = now.getFullYear();
const month = now.getMonth() + 1;
const day = now.getDate();
const weekday = ['日','月','火','水','木','金','土'][now.getDay()];
dateEl.textContent = `🦆 ${year}年${month}月${day}日（${weekday}）`;
</script>

</body>
</html>

<!DOCTYPE html>

<title>カルガモカウンター</title>

<style>
:root {
  --green-main:#0b5a35;
  --green-dark:#084526;
  --accent-orange:#ff8c1a;
  --accent-yellow:#ffe600;
  --white:#ffffff;
  --gray:#e0e0e0;
  --divider-color: rgba(255,255,255,0.3);
}

body {
  margin:0;
  background:var(--green-main);
  color:var(--white);
  font-family:-apple-system, BlinkMacSystemFont, "Segoe UI",
               Roboto, "Noto Sans JP", sans-serif;
  font-variant-numeric: tabular-nums;
}

/* ===== ヘッダー ===== */
header {
  position:fixed;
  top:0;
  left:0;
  right:0;
  height:64px;
  background:var(--white);
  color:#000;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 12px;
  z-index:10;
}

header .date {
  font-size:20px;
  font-weight:bold;
}

header button {
  font-size:14px;
  padding:6px 10px;
}

/* 12H / 24H 切り替えボタン */
.time-toggle {
  min-height: 40px;
  padding: 0 14px;

  border-radius: 999px;
  border: 1px solid var(--divider-color);
  background: transparent;

  font-size: 14px;
  font-weight: bold;
  color: #666;

  display: flex;
  align-items: center;
  justify-content: center;

  cursor: pointer;
}

/* 選択中 */
.time-toggle.active {
  background: var(--gray);
  border-color: var(--divider-color);
  color: #000;
}

/* ===== フッター ===== */

footer {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: 132px;
  background: var(--white);
  display: flex;
  flex-direction: column;
  z-index: 20;
}

.footer-row {
  display: flex;
  width: 100%;
}

.footer-row-main {
  height: 68px;
}

.footer-row-sub {
  height: 64px;
}

footer button {
  width: 100%;
  height: 100%;
  border: none;
  font-weight: bold;
  cursor: pointer;
  pointer-events: auto;
  touch-action: manipulation;
}

.footer-row-sub button {
  flex: 1;
  font-size: 18px;
}

.stamp-btn {
  background: #ffffff;
  color: #000;
  font-size: 24px;
}

.edit-btn {
  background: #ddd;
  color: #000;
}

.send-btn {
  background: var(--accent-orange);
  color: #000;
}

button:active {
  transform: scale(0.98);
  opacity: 0.85;
}
.edit-btn {
  background:#ddd;
  font-weight:bold;
}

.send-btn {
  background:var(--accent-orange);
  color:#000;
  font-weight:bold;
}

/* ===== メイン ===== */
main {
  padding:80px 16px 120px;
}

.log {
  border-bottom: 1px solid var(--divider-color);
  padding:16px 0;
}

.time-row {
  display:flex;
  align-items:center;
  justify-content: space-between;
}

.time {
  font-size:64px;
  font-weight:bold;
  line-height:1;
}

.count {
  margin-left:12px;
  width:40px;
  height:40px;
  border-radius:50%;
  background: transparent;
  border: 1px solid var(--divider-color);
  color: #eee;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
  font-size:18px;
}

.log.latest .count {
  border-color: var(--accent-orange);
  color: var(--accent-orange);
}

.elapsed {
  color:var(--accent-yellow);
  text-align: right;
  margin-left:6px;
  margin-top:4px;
  font-size:18px;
}

<script>
  const STORAGE_KEY = 'karugamo_pending_logs';

  const dateEl = document.querySelector('.date');
  const mainEl = document.querySelector('main');

  function updateDateHeader() {
    const now = new Date();
    const year = now.getFullYear();
    const month = now.getMonth() + 1;
    const day = now.getDate();
    const weekday = ['日','月','火','水','木','金','土'][now.getDay()];
    dateEl.textContent = `🦆 ${year}年${month}月${day}日（${weekday}）`;
  }

  function loadLogs() {
    const json = localStorage.getItem(STORAGE_KEY);
    if (!json) return [];

    try {
      return JSON.parse(json);
    } catch (e) {
      console.error(e);
      return [];
    }
  }

  function saveLogs(logs) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(logs));
  }

  function clearLogs() {
    localStorage.removeItem(STORAGE_KEY);
  }

  function formatTime(date) {
    const h = String(date.getHours()).padStart(2, '0');
    const m = String(date.getMinutes()).padStart(2, '0');
    return `${h}:${m}`;
  }

  function addStamp() {
    const logs = loadLogs();
    const now = new Date();

    const previousLog = logs.length > 0 ? logs[logs.length - 1] : null;

    const intervalMs = previousLog
      ? now.getTime() - Number(previousLog.received_at_ms)
      : '';

    const log = {
      id: String(Date.now()),
      source: 'manual',
      driver_name: '',
      driver_phone: '',
      device_id: getDeviceId(),
      press_count: logs.length + 1,
      interval_ms: intervalMs,
      received_at_ms: now.getTime(),
      received_at: formatDateTimeJst(now),
      display_time: formatTime(now),
      memo: ''
    };

    addPendingLog(log);
  }

  function getDeviceId() {
    let deviceId = localStorage.getItem('karugamo_device_id');

    if (!deviceId) {
      deviceId = 'device_' + Date.now();
      localStorage.setItem('karugamo_device_id', deviceId);
    }

    return deviceId;
  }

  function renderLogs() {
    const logs = loadLogs();

    const oldLogs = mainEl.querySelectorAll('.log');
    oldLogs.forEach(el => el.remove());

    const displayLogs = [...logs].reverse();

    displayLogs.forEach((log, index) => {
      const div = document.createElement('div');
      div.className = index === 0 ? 'log latest' : 'log';

      const elapsedText = getElapsedText(log, logs);

      div.innerHTML = `
        <div class="time-row">
          <div class="time">${log.display_time}</div>
          <div class="count">${log.press_count}</div>
        </div>
        ${elapsedText ? `<div class="elapsed">${elapsedText}</div>` : ''}
      `;

      mainEl.appendChild(div);
      
    });
  }

  function getElapsedText(log, logs) {
    const index = logs.findIndex(item => item.id === log.id);

    if (index <= 0) {
      return '';
    }

    const previousLog = logs[index - 1];
    const currentTime = Number(log.received_at_ms);
    const previousTime = Number(previousLog.received_at_ms);

    if (!currentTime || !previousTime) {
      return '';
    }

    const diffMin = Math.round((currentTime - previousTime) / 1000 / 60);

    return `${diffMin}分`;
  }

  // function sendLogs() {
  //   const logs = loadLogs();

  //   if (logs.length === 0) {
  //     alert('送信するデータがありません');
  //     return;
  //   }

  //   if (!confirm(`${logs.length}件のデータを送信しますか？`)) {

  //   google.script.run

  //     })
  //     .saveLogsFromWeb(logs);
  // }
  function sendLogs() {
    const logs = loadLogs();

    if (logs.length === 0) {
      alert('送信するデータがありません');
      return;
    }

    alert('Androidアプリ版の送信処理は、次の手順で設定します。データは端末内に残っています。');
  }

  function formatDateTimeJst(date) {
    const year = date.getFullYear();
    const month = String(date.getMonth() + 1).padStart(2, '0');
    const day = String(date.getDate()).padStart(2, '0');
    const hour = String(date.getHours()).padStart(2, '0');
    const minute = String(date.getMinutes()).padStart(2, '0');
    const second = String(date.getSeconds()).padStart(2, '0');

    return `${year}/${month}/${day} ${hour}:${minute}:${second}`;
  }

  function addPendingLog(logData) {
    const logs = loadLogs();
    logs.push(logData);
    saveLogs(logs);
    renderLogs();
  }

  function receiveAtomLog(atomData) {
    const now = new Date();

    const log = {
      id: String(Date.now()),
      source: 'atom',
      driver_name: '',
      driver_phone: '',
      device_id: atomData.device_id || '',
      press_count: atomData.press_count || '',
      interval_ms: atomData.interval_ms || '',
      received_at_ms: now.getTime(),
      received_at: formatDateTimeJst(now),
      display_time: formatTime(now),
      memo: ''
    };

    addPendingLog(log);
  }

  function receiveAtomNotifyJson(jsonText) {
    try {
      const atomData = JSON.parse(jsonText);
      receiveAtomLog(atomData);
    } catch (e) {
      console.error('ATOM Lite JSON parse error:', e);
      alert('ATOM Liteからのデータ形式が不正です');
    }
  }

  updateDateHeader();
  renderLogs();
</script>
